services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: a-love-letter:latest
    container_name: a-love-letter
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 10s
    # Optional: mount your own nginx config without rebuilding
    # volumes:
    #   - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro